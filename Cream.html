<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Candles</title>
<link rel="stylesheet" href="Product.css">
</head>

<body>

<header>
    <h1>Serenity Candles</h1>
</header>

<section class="product-page">

    <!-- Left Image -->
    <div class="product-image">
        <img src="star_candle/star_candle.jpeg" id="mainCandle" alt="Candle">
    </div>

    <!-- Right Details -->
    <div class="product-details">
        <h2>Cream Architectural Pillar</h2>
        <p class="price">R180</p>
      <label>Color</label>
       <div class="options" id="ColorOptions">
           <button onclick="changeColor('star_candle/blue.png')">Blue</button>
           <button onclick="changeColor('star_candle/pink.png')">Pink</button>
           <button onclick="changeColor('star_candle/purple.png')">Purple</button>
           <button onclick="changeColor('star_candle/red.png')">Red</button>
    

        <div class="description">
            <h3>Description</h3>
            <p>
                A sophisticated set of candles featuring clean lines and architectural shapes in a soft cream finish.
                 Designed to elevate any space, they serve as both elegant décor pieces and sources of a warm, ambient glow.
            </p>
        </div>
    </div>

</section>
<script src="Product.js"></script>
</body>
</html>
