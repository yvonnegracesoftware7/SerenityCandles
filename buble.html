<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Candles</title>
<link rel="stylesheet" href="Product.css">
</head>

<body>

<header>
    <h1>Serenity Candles</h1>
</header>

<section class="product-page">

    <!-- Left Image -->
    <div class="product-image">
        <img src="Bubble_Cube/Bubble_Cube.jpg" id="mainCandle" alt="Candle">
    </div>

    <!-- Right Details -->
    <div class="product-details">
        <h2>Serenity Bubble Candle</h2>
        <p class="price">R180</p>
      <label>Color</label>
       <div class="options" id="ColorOptions">
           <button onclick="changeColor('Bubble_Cube/blue.png')">Blue</button>
           <button onclick="changeColor('Bubble_Cube/pink.png')">Pink</button>
           <button onclick="changeColor('Bubble_Cube/purple.png')">Purple</button>
           <button onclick="changeColor('Bubble_Cube/red.png')">Red</button>
    

        <div class="description">
            <h3>Description</h3>
            <p>
                A stylish, modern candle with a unique bubble design that adds a decorative touch to any space.
                It creates a warm, cozy glow while doubling as a beautiful statement piece for your home.
            </p>
        </div>
    </div>

</section>
<script src="Product.js"></script>
</body>
</html>
