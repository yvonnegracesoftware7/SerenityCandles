<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Candles</title>
<link rel="stylesheet" href="Product.css">
</head>

<body>

<header>
    <h1>Serenity Candles</h1>
</header>

<section class="product-page">

    <!-- Left Image -->
    <div class="product-image">
        <img src="Ribbed_pillar/Ribbed_pillar.jpeg" id="mainCandle" alt="Candle">
    </div>

    <!-- Right Details -->
    <div class="product-details">
        <h2>Ribbed Pillar Candle</h2>
        <p class="price">R180</p>
      <label>Color</label>
       <div class="options" id="ColorOptions">
           <button onclick="changeColor('Ribbed_pillar/gold.png')">Gold</button>
           <button onclick="changeColor('Ribbed_pillar/pink.png')">Pink</button>
           <button onclick="changeColor('Ribbed_pillar/purple.png')">Purple</button>
           <button onclick="changeColor('Ribbed_pillar/green.png')">Green</button>
    

        <div class="description">
            <h3>Description</h3>
            <p>
                 The classic pillar candle with a textured ribbed design 
                 that adds elegance and depth to any space. 
                 It burns steadily while creating a warm, inviting glow,
                 making it perfect for both décor and relaxation.
            </p>
        </div>
    </div>

</section>
<script src="Product.js"></script>
</body>
</html>
