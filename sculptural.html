<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Candles</title>
<link rel="stylesheet" href="Product.css">
</head>

<body>

<header>
    <h1>Serenity Candles</h1>
</header>

<section class="product-page">

    <!-- Left Image -->
    <div class="product-image">
        <img src="Sculptural_Pillar/Sculptural_Pillar.jpg" id="mainCandle" alt="Candle">
    </div>

    <!-- Right Details -->
    <div class="product-details">
        <h2>Sculptural Pillar Candles</h2>
        <p class="price">R180</p>
      <label>Color</label>
       <div class="options" id="ColorOptions">
           <button onclick="changeColor('Sculptural_Pillar/pink.png')">Pink</button>
           <button onclick="changeColor('Sculptural_Pillar/sky_blue.png')">Sky Blue</button>
           <button onclick="changeColor('Sculptural_Pillar/red.png')">Red</button>
           <button onclick="changeColor('Sculptural_Pillar/white.png')">White</button>
    

        <div class="description">
            <h3>Description</h3>
            <p>
                Artistic and modern, Sculptural Pillar Candles are designed to double as décor pieces with their
                 unique shapes and forms. They add elegance and character to any space while providing a soft, 
                 warm glow for a cozy and stylish atmosphere.
            </p>
        </div>
    </div>

</section>
<script src="Product.js"></script>
</body>
</html>
