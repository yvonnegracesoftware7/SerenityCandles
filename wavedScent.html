<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candle Product</title>
<link rel="stylesheet" href="Product.css">
</head>

<body>

<header>
    <h1>Serenity Candles</h1>
</header>

<section class="product-page">

    <!-- Left Image -->
    <div class="product-image">
        <img src="Ribbed_Wave/Ribbed_Wave.jpeg" id="mainCandle" alt="Candle">
    </div>

    <!-- Right Details -->
    <div class="product-details">
        <h2>Modern Ribbed Wave Candle</h2>
        <p class="price">R180</p>
      <label>Color</label>
    <div class="options" id="ColorOptions">
       <button onclick="changeColor('Ribbed_Wave/red.png')">Red</button>
       <button onclick="changeColor('Ribbed_Wave/pink.png')">Pink</button>
       <button onclick="changeColor('Ribbed_Wave/blue.png')">Blue</button>
       <button onclick="changeColor('Ribbed_Wave/green.png')">Green</button>
    

        <div class="description">
            <h3>Description</h3>
            <p>
                A contemporary candle featuring a flowing ribbed wave design that adds movement and elegance to any space.
                 Its sculptural look makes it a stylish décor piece, while its soft glow creates a warm and calming atmosphere.
            </p>
        </div>
    </div>

</section>
<script src="Product.js"></script>
</body>
</html>
